---
# AAP connection — set via environment variables, never hardcode here
controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
validate_certs: false

# Splunk connection
splunk_host: "{{ lookup('env', 'SPLUNK_HOST') }}"
splunk_username: "{{ lookup('env', 'SPLUNK_USERNAME') }}"
splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

# EDA connection
eda_webhook_url: "{{ lookup('env', 'EDA_WEBHOOK_URL') }}"

# Bastion SSH (required for network device access)
bastion_host: "{{ lookup('env', 'BASTION_HOST') }}"
bastion_port: "{{ lookup('env', 'BASTION_PORT') | default('22') }}"
bastion_user: "{{ lookup('env', 'BASTION_USER') | default('lab-user') }}"
bastion_password: "{{ lookup('env', 'BASTION_PASSWORD') }}"

# Cisco router (Phase 2 reset — hostname resolved by bastion; password always ansible123! on RHDP)
network_username: "{{ lookup('env', 'NETWORK_USERNAME') | default('admin') }}"
network_password: "{{ lookup('env', 'NETWORK_PASSWORD') | default('ansible123!') }}"

# Workshop defaults
organization: "Default"
