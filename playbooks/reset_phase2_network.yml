---
- name: Phase 2 reset — return network to known-good demo-ready state
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Write bastion password to temp file
      ansible.builtin.tempfile:
        state: file
      register: bastion_pass_file
      no_log: true

    - block:
        - name: Populate bastion password file
          ansible.builtin.copy:
            content: "{{ bastion_password }}"
            dest: "{{ bastion_pass_file.path }}"
            mode: '0600'
          no_log: true

        - name: Restore tunnel0 on cisco-rtr1 (no shut)
          ansible.netcommon.cli_config:
            config: |
              interface tunnel0
               no shutdown
          vars:
            ansible_host: "cisco-rtr1"
            ansible_user: "{{ lookup('env', 'NETWORK_USERNAME') | default('admin') }}"
            ansible_password: "{{ lookup('env', 'NETWORK_PASSWORD') | mandatory }}"
            ansible_network_os: cisco.ios.ios
            ansible_connection: network_cli
            ansible_ssh_common_args: >-
              -o ProxyCommand='sshpass -f {{ bastion_pass_file.path }} ssh -p {{ bastion_port }}
              -o StrictHostKeyChecking=no {{ bastion_user }}@{{ bastion_host }} -W %h:%p'
              -o StrictHostKeyChecking=no

      always:
        - name: Remove bastion password temp file
          ansible.builtin.file:
            path: "{{ bastion_pass_file.path }}"
            state: absent
          when: bastion_pass_file.path is defined
          no_log: true
